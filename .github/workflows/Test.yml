name: 'Test'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: ["aarch64", "amd64"]
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Test build
      uses: home-assistant/builder@2026.03.2
      with:
        args: |
          --${{ matrix.arch }} \
          --target samba \
          --test
